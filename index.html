<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Avanti Soporte TI</title>
    <link rel="stylesheet" href="styles.css">
    
    <!-- Ícono de la pestaña -->
    <link rel="icon" type="image/jpeg" href="AVANTI LOGO (1).jpeg">
    
    <script>
        // Si ya hay sesión, redirigir al dashboard inmediatamente
        if (localStorage.getItem('session')) {
            window.location.replace('dashboard.html');
        }
    </script>
</head>
<body class="dark-theme login-body">
    <div class="login-container">
        <div class="login-card-mate">
            <div class="login-header">
                <!-- Integración del logo -->
                <img src="AVANTI LOGO (1).jpeg" alt="Logo Avanti" class="logo-login">
                <h2 id="formTitle">Iniciar Sesión</h2>
                <p id="formSubtitle">Portal de Gestión de Actas y Equipos</p>
            </div>
            
            <!-- FORMULARIO DE INICIO DE SESIÓN -->
            <form id="loginForm">
                <div class="input-group-mate">
                    <label for="loginEmail">Correo Corporativo</label>
                    <input type="email" id="loginEmail" required>
                </div>
                <div class="input-group-mate">
                    <label for="loginPassword">Contraseña</label>
                    <input type="password" id="loginPassword" required>
                </div>
                <button type="submit" class="btn-avanti w-100">Ingresar al Portal</button>
                
                <div class="divider">o</div>
                
                <!-- Ingreso como Invitado -->
                <button type="button" id="btnGuest" class="btn-outline-mate w-100">👁️ Ingresar como Invitado</button>
                
                <p class="toggle-text">¿No tienes cuenta? <a href="#" id="showRegister">Regístrate aquí</a></p>
            </form>

            <!-- FORMULARIO DE REGISTRO (Oculto por defecto) -->
            <form id="registerForm" style="display: none;">
                <div class="input-group-mate">
                    <label for="regName">Nombre Completo</label>
                    <input type="text" id="regName" required>
                </div>
                <div class="input-group-mate">
                    <label for="regEmail">Correo Corporativo</label>
                    <input type="email" id="regEmail" required>
                </div>
                <div class="input-group-mate">
                    <label for="regPassword">Contraseña</label>
                    <input type="password" id="regPassword" required>
                </div>
                <button type="submit" class="btn-avanti w-100">Crear Cuenta</button>
                
                <p class="toggle-text">¿Ya tienes cuenta? <a href="#" id="showLogin">Inicia sesión</a></p>
            </form>
        </div>
    </div>

    <!-- LÓGICA DE INTERFAZ Y AUTENTICACIÓN -->
    <script>
        // Referencias al DOM
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const showRegister = document.getElementById('showRegister');
        const showLogin = document.getElementById('showLogin');
        const formTitle = document.getElementById('formTitle');
        const btnGuest = document.getElementById('btnGuest');

        // Alternar entre Login y Registro
        showRegister.addEventListener('click', (e) => {
            e.preventDefault();
            loginForm.style.display = 'none';
            registerForm.style.display = 'block';
            formTitle.textContent = 'Crear Cuenta';
        });

        showLogin.addEventListener('click', (e) => {
            e.preventDefault();
            registerForm.style.display = 'none';
            loginForm.style.display = 'block';
            formTitle.textContent = 'Iniciar Sesión';
        });

        // ==========================================
        // 1. LÓGICA DE LOGIN (Conectada a Neon DB)
        // ==========================================
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const submitBtn = loginForm.querySelector('button[type="submit"]');

            // Efecto de carga en el botón
            const originalText = submitBtn.textContent;
            submitBtn.textContent = 'Verificando...';
            submitBtn.disabled = true;

            try {
                // Llamada a tu API en Vercel
                const response = await fetch('/api/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ correo: email, password: password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // Traducir el rol de la base de datos al frontend
                    const userRole = data.user.rol === 'Administrador' ? 'admin' : 'viewer';

                    // Guardar los datos del usuario extraídos de Neon PostgreSQL
                    const session = { 
                        id: data.user.id_usuario,
                        name: data.user.nombre, 
                        role: userRole, 
                        token: 'auth-' + Date.now() 
                    };
                    
                    localStorage.setItem('session', JSON.stringify(session));
                    window.location.replace('dashboard.html');
                } else {
                    alert(data.message || 'Correo o contraseña incorrectos.');
                }
            } catch (error) {
                alert('Hubo un problema al conectar con el servidor. Revisa tu conexión.');
                console.error('Error de fetch:', error);
            } finally {
                // Restaurar el botón independientemente del resultado
                submitBtn.textContent = originalText;
                submitBtn.disabled = false;
            }
        });

        // ==========================================
        // 2. LÓGICA DE INVITADO (Acceso Total)
        // ==========================================
        btnGuest.addEventListener('click', () => {
            const session = { 
                name: 'Invitado', 
                role: 'admin', // <-- CAMBIADO: Ahora tiene permisos completos de administrador
                token: 'guest-000' 
            };
            localStorage.setItem('session', JSON.stringify(session));
            window.location.replace('dashboard.html');
        });

        // ==========================================
        // 3. LÓGICA DE REGISTRO (Simulación Local)
        // ==========================================
        registerForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim().toLowerCase();
            const password = document.getElementById('regPassword').value;

            // Almacenamiento local temporal para el registro
            let db = [];
            try { db = JSON.parse(localStorage.getItem('usersDB')) || []; } catch(err) {}
            
            if (db.find(u => u.email === email)) {
                alert('Este correo ya está registrado.');
                return;
            }

            db.push({ name, email, password, role: 'admin' });
            localStorage.setItem('usersDB', JSON.stringify(db));
            
            alert('Cuenta de prueba creada en el navegador. (Nota: Para iniciar sesión permanentemente, la cuenta debe crearse en la base de datos Neon).');
            registerForm.reset();
            showLogin.click();
        });
    </script>
</body>
</html>
