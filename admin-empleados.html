<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Directorio de Personal - Avanti</title>
  <link rel="icon" type="image/jpeg" href="/AVANTI%20LOGO%20(1).jpeg">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://unpkg.com/tabulator-tables@5.5.0/dist/css/tabulator.min.css" rel="stylesheet">
  <script type="text/javascript" src="https://unpkg.com/tabulator-tables@5.5.0/dist/js/tabulator.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    body { background-color: #F3F4F6; font-family: 'Inter', system-ui, sans-serif; color: #334155; }
    
    .tabulator { border: none !important; background-color: transparent !important; font-size: 13px; }
    .tabulator-header { background-color: #1E293B !important; color: #F8FAFC !important; font-weight: 500; border-bottom: none !important; border-top-left-radius: 8px; border-top-right-radius: 8px; }
    .tabulator-col { background-color: transparent !important; border-right: none !important; padding: 6px 4px !important; }
    .tabulator-col-title { font-weight: 600 !important; font-size: 12.5px; }
    .tabulator-row { background-color: #FFFFFF !important; border-bottom: 1px solid #F1F5F9 !important; transition: background-color 0.2s ease; }
    .tabulator-row:nth-child(even) { background-color: #FAFAFA !important; }
    .tabulator-row:hover { background-color: #F1F5F9 !important; }
    .tabulator-cell { border-right: none !important; padding: 14px 10px !important; vertical-align: middle !important; }
    
    .action-btn { display: inline-flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 6px; border: 1px solid transparent; transition: all 0.2s ease; cursor: pointer; background: white; }
    .btn-del { color: #DC2626; border-color: #FECACA; }
    .btn-del:hover { background: #FEE2E2; }
  </style>
</head>
<body class="p-4 md:p-8">

  <div class="max-w-[1200px] mx-auto space-y-6">
    
    <!-- CABECERA -->
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center bg-white p-6 rounded-xl shadow-sm border border-gray-100">
      <div class="flex items-center gap-4">
        <div class="p-2 bg-gray-50 rounded-lg border border-gray-100">
          <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
        </div>
        <div>
          <h1 class="text-xl font-bold text-gray-800 tracking-tight">Directorio de Personal</h1>
          <p class="text-sm text-gray-500 font-medium mt-0.5">Gestión de empleados para asignación de equipos</p>
        </div>
      </div>
      <div class="mt-4 md:mt-0 flex w-full md:w-auto gap-3">
        <button onclick="location.href='index.html'" class="flex-1 md:flex-none flex items-center justify-center gap-2 bg-white hover:bg-gray-50 text-gray-700 border border-gray-300 font-medium py-2 px-4 rounded-lg text-sm transition shadow-sm">
          Dashboard
        </button>
        <button onclick="document.getElementById('modal-empleado').classList.remove('hidden')" class="flex-1 md:flex-none flex items-center justify-center gap-2 bg-green-600 hover:bg-green-700 text-white font-medium py-2 px-5 rounded-lg text-sm transition shadow-sm">
          + Añadir Empleado
        </button>
      </div>
    </div>

    <!-- CONTENEDOR DEL GRID -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
      <div id="empleados-grid" class="w-full"></div>
    </div>
  </div>

  <!-- MODAL: AÑADIR EMPLEADO -->
  <div id="modal-empleado" class="fixed inset-0 bg-slate-900 bg-opacity-70 backdrop-blur-sm z-[9999] hidden flex items-center justify-center p-4">
    <div class="bg-white rounded-xl max-w-lg w-full overflow-hidden shadow-2xl">
      <div class="bg-green-600 px-6 py-4 flex justify-between items-center text-white">
        <h3 class="font-bold text-lg">Registrar Nuevo Empleado</h3>
        <button onclick="document.getElementById('modal-empleado').classList.add('hidden')" class="hover:text-green-200">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
      </div>
      <form id="form-empleado" class="p-6 space-y-4">
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">DNI *</label>
            <input type="text" id="emp-dni" required class="w-full px-3 py-2 border rounded-lg text-sm focus:border-green-600 focus:outline-none">
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">Centro Costo</label>
            <input type="text" id="emp-cc" class="w-full px-3 py-2 border rounded-lg text-sm focus:border-green-600 focus:outline-none">
          </div>
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">Nombre Completo *</label>
          <input type="text" id="emp-nombre" required class="w-full px-3 py-2 border rounded-lg text-sm focus:border-green-600 focus:outline-none">
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">Área / Departamento *</label>
            <input type="text" id="emp-area" required class="w-full px-3 py-2 border rounded-lg text-sm focus:border-green-600 focus:outline-none">
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">Cargo / Puesto *</label>
            <input type="text" id="emp-cargo" required class="w-full px-3 py-2 border rounded-lg text-sm focus:border-green-600 focus:outline-none">
          </div>
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">Correo Corporativo</label>
          <input type="email" id="emp-correo" class="w-full px-3 py-2 border rounded-lg text-sm focus:border-green-600 focus:outline-none">
        </div>
        <div class="pt-4 flex justify-end gap-3 border-t mt-4">
          <button type="button" onclick="document.getElementById('modal-empleado').classList.add('hidden')" class="px-5 py-2 text-sm text-gray-600 hover:bg-gray-100 rounded-lg font-medium">Cancelar</button>
          <button type="submit" id="btn-save-emp" class="px-5 py-2 text-sm bg-green-600 text-white hover:bg-green-700 rounded-lg font-medium shadow-sm">Guardar Empleado</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // Validar Sesión Activa
    if(!localStorage.getItem('avanti_user')) window.location.href = 'login.html';

    let tablaEmpleados;

    async function cargarEmpleados() {
      try {
        const res = await fetch('/api/empleados');
        const data = await res.json();
        
        if(tablaEmpleados) {
            tablaEmpleados.setData(data.data);
            return;
        }

        tablaEmpleados = new Tabulator("#empleados-grid", {
          data: data.data,
          layout: "fitColumns",
          pagination: "local",
          paginationSize: 15,
          columns: [
            { title: "DNI", field: "dni", width: 110, headerFilter: "input" },
            { title: "Nombre Completo", field: "nombre_completo", headerFilter: "input", formatter: cell => `<span class="font-medium text-gray-800">${cell.getValue()}</span>` },
            { title: "Área", field: "area", headerFilter: "input" },
            { title: "Cargo", field: "cargo", headerFilter: "input" },
            { title: "Correo Corp.", field: "correo_corp", width: 200, formatter: cell => cell.getValue() ? cell.getValue() : `<span class="text-gray-400 italic">-</span>` },
            { 
              title: "Acciones", width: 100, hozAlign: "center", headerSort: false,
              formatter: () => `<button class='action-btn btn-del' title='Eliminar Empleado'><svg class="w-4 h-4 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>`,
              cellClick: async function(e, cell) {
                if(e.target.closest('.btn-del')) {
                  if(confirm("¿Eliminar este empleado del directorio?")) {
                    const id = cell.getRow().getData().id_empleado;
                    await fetch('/api/empleados', { method: 'DELETE', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({id_empleado: id}) });
                    cell.getRow().delete();
                  }
                }
              }
            }
          ]
        });
      } catch (err) { console.error("Error cargando empleados:", err); }
    }

    // Inicializar carga
    cargarEmpleados();

    // Guardar nuevo empleado
    document.getElementById('form-empleado').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn-save-emp');
      btn.innerText = "Guardando...";
      
      const payload = {
        dni: document.getElementById('emp-dni').value,
        nombre_completo: document.getElementById('emp-nombre').value.toUpperCase(),
        area: document.getElementById('emp-area').value.toUpperCase(),
        cargo: document.getElementById('emp-cargo').value.toUpperCase(),
        correo_corp: document.getElementById('emp-correo').value.toLowerCase(),
        centro_costo: document.getElementById('emp-cc').value.toUpperCase()
      };

      try {
        const res = await fetch('/api/empleados', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        
        if (res.ok) {
          document.getElementById('modal-empleado').classList.add('hidden');
          document.getElementById('form-empleado').reset();
          cargarEmpleados(); // Recargar tabla
        } else { alert("Error al guardar el empleado."); }
      } catch (err) { alert("Error de conexión."); }
      finally { btn.innerText = "Guardar Empleado"; }
    });
  </script>
</body>
</html>
