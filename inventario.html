<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control de Inventario TI - Agrícola Avanti</title>
  <link rel="icon" type="image/jpeg" href="/AVANTI%20LOGO%20(1).jpeg">
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Tabulator CDN -->
  <link href="https://unpkg.com/tabulator-tables@5.5.0/dist/css/tabulator.min.css" rel="stylesheet">
  <script type="text/javascript" src="https://unpkg.com/tabulator-tables@5.5.0/dist/js/tabulator.min.js"></script>
  <style>
    .tabulator { font-size: 12px; }
    .tabulator-header { background-color: #0E5A32 !important; color: white !important; }
  </style>
</head>
<body class="p-6 bg-gray-50">
  <div class="max-w-6xl mx-auto">
    <header class="flex justify-between items-center mb-6">
      <div>
        <h1 class="text-2xl font-bold text-emerald-800 uppercase">Control de Inventario TI</h1>
        <p class="text-xs text-gray-500">Haz doble clic en cualquier celda para editar el inventario patrimonial.</p>
      </div>
      <button class="bg-emerald-800 hover:bg-emerald-950 text-white font-bold px-4 py-2 rounded text-xs" onclick="location.href='index.html'">
        ← Volver al Menú
      </button>
    </header>

    <div id="tabla-inventario" class="shadow rounded-lg overflow-hidden border bg-white"></div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        const res = await fetch('/api/obtener-metricas'); // Reutilizamos tu endpoint analítico que mapea el inventario o creamos uno de carga simple
        const responseData = await fetch('/api/obtener-metricas?modo=completo');
        const data = await responseData.json();

        const table = new Tabulator("#tabla-inventario", {
          data: data.inventario_total,
          layout: "fitColumns",
          pagination: "local",
          paginationSize: 10,
          columns: [
            {title: "Cód. Patrimonial", field: "codigo_patrimonial", sorter: "string"},
            {title: "Tipo", field: "tipo_hardware", sorter: "string"},
            {title: "Marca", field: "marca"},
            {title: "Modelo", field: "modelo"},
            {title: "Nº Serie", field: "numero_serie"},
            {title: "Estado Operativo", field: "estado_operativo", editor: "select", editorParams: {values: ["STOCK", "OPERATIVO", "REPARACION"]}}
          ]
        });
      } catch (err) {
        console.error(err);
      }
    });
  </script>
</body>
</html>
