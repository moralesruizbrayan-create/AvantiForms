<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal ITAM Avanti - Gestión de Actas</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans">
    
    <!-- Navegación -->
    <nav class="bg-green-900 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-wider">AVANTI ITAM</h1>
            <ul class="flex space-x-6">
                <li><a href="index.html" class="hover:text-green-300">Dashboard</a></li>
                <li><a href="gestion-actas.html" class="hover:text-green-300 font-semibold border-b-2 border-green-300 pb-1">Gestión de Actas</a></li>
                <li><a href="inventario.html" class="hover:text-green-300">Inventario Global</a></li>
            </ul>
        </div>
    </nav>

    <!-- Formulario Transaccional -->
    <main class="container mx-auto mt-8 p-4 max-w-3xl">
        <div class="bg-white p-8 rounded-lg shadow-lg">
            <h2 class="text-2xl font-bold mb-6 text-gray-800 border-b pb-2">Nueva Acta de Asignación</h2>
            
            <form id="form-acta" onsubmit="enviarActa(event)">
                
                <!-- Datos del Empleado y Acta -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">ID Empleado</label>
                        <input type="number" id="idEmpleado" required class="w-full p-2 border rounded focus:ring focus:ring-green-300" placeholder="Ej: 1045">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Tipo de Acta</label>
                        <select id="tipoActa" required class="w-full p-2 border rounded focus:ring focus:ring-green-300">
                            <option value="ENTREGA_NUEVO_INGRESO">Entrega - Nuevo Ingreso</option>
                            <option value="RENOVACION_EQUIPO">Renovación de Equipo</option>
                            <option value="PRESTAMO_TEMPORAL">Préstamo Temporal</option>
                        </select>
                    </div>
                </div>

                <!-- Asignación de Hardware (Dinámico) -->
                <div class="mb-6 bg-gray-50 p-4 rounded border">
                    <h3 class="text-lg font-semibold mb-4 text-gray-700">Equipos a Asignar</h3>
                    
                    <div id="contenedor-equipos" class="space-y-3">
                        <div class="flex space-x-2 equipo-item">
                            <input type="number" placeholder="ID Interno del Activo (Ej: 12)" required class="w-full p-2 border rounded id-activo">
                            <button type="button" onclick="eliminarFila(this)" class="bg-red-500 text-white px-3 py-2 rounded hover:bg-red-600 font-bold">X</button>
                        </div>
                    </div>
                    
                    <button type="button" onclick="agregarFila()" class="mt-4 bg-gray-200 text-gray-700 px-4 py-2 rounded hover:bg-gray-300 text-sm font-semibold">
                        + Agregar otro equipo
                    </button>
                </div>

                <!-- Botón de Submit con estado de carga -->
                <div class="flex justify-end mt-6">
                    <button type="submit" id="btn-guardar" class="bg-green-700 text-white px-6 py-2 rounded font-bold hover:bg-green-800 transition duration-200">
                        Procesar y Guardar Acta
                    </button>
                </div>
                
                <!-- Contenedor de Alertas -->
                <div id="alerta-mensaje" class="mt-4 p-3 rounded hidden"></div>
            </form>
        </div>
    </main>

    <script>
        // Lógica para agregar/eliminar inputs de equipos dinámicamente
        function agregarFila() {
            const contenedor = document.getElementById('contenedor-equipos');
            const html = `
                <div class="flex space-x-2 equipo-item mt-3">
                    <input type="number" placeholder="ID Interno del Activo" required class="w-full p-2 border rounded id-activo">
                    <button type="button" onclick="eliminarFila(this)" class="bg-red-500 text-white px-3 py-2 rounded hover:bg-red-600 font-bold">X</button>
                </div>`;
            contenedor.insertAdjacentHTML('beforeend', html);
        }

        function eliminarFila(btn) {
            btn.parentElement.remove();
        }

        // Lógica transaccional con la API
        async function enviarActa(event) {
            event.preventDefault(); // Evita recargar la página

            const btnGuardar = document.getElementById('btn-guardar');
            const alerta = document.getElementById('alerta-mensaje');
            
            // UI: Modo de carga
            btnGuardar.disabled = true;
            btnGuardar.innerText = "Procesando...";
            alerta.classList.add('hidden');

            // Recolectar datos
            const idEmpleado = document.getElementById('idEmpleado').value;
            const tipoActa = document.getElementById('tipoActa').value;
            
            // Recolectar el array de equipos a asignar
            const inputsEquipos = document.querySelectorAll('.id-activo');
            const equiposAsignados = [];
            inputsEquipos.forEach(input => {
                if(input.value) {
                    equiposAsignados.push({ idActivo: parseInt(input.value) });
                }
            });

            const payload = {
                idEmpleado: parseInt(idEmpleado),
                tipoActa: tipoActa,
                equiposAsignados: equiposAsignados
            };

            try {
                // Conexión con Vercel Serverless
                const response = await fetch('/api/guardar-acta', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await response.json();

                alerta.classList.remove('hidden');
                if (response.ok && data.success) {
                    alerta.className = "mt-4 p-3 rounded bg-green-100 text-green-800 border border-green-300";
                    alerta.innerText = `¡Éxito! Acta #${data.idActa} registrada correctamente.`;
                    document.getElementById('form-acta').reset();
                    document.getElementById('contenedor-equipos').innerHTML = `
                        <div class="flex space-x-2 equipo-item">
                            <input type="number" placeholder="ID Interno del Activo" required class="w-full p-2 border rounded id-activo">
                            <button type="button" onclick="eliminarFila(this)" class="bg-red-500 text-white px-3 py-2 rounded hover:bg-red-600 font-bold">X</button>
                        </div>`;
                } else {
                    throw new Error(data.error || "Error desconocido del servidor");
                }
            } catch (error) {
                alerta.classList.remove('hidden');
                alerta.className = "mt-4 p-3 rounded bg-red-100 text-red-800 border border-red-300";
                alerta.innerText = `Error: ${error.message}`;
            } finally {
                // UI: Restaurar botón
                btnGuardar.disabled = false;
                btnGuardar.innerText = "Procesar y Guardar Acta";
            }
        }
    </script>
</body>
</html>
