<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Avanti Soporte TI</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/jpeg" href="AVANTI LOGO (1).jpeg">
    
    <script>
        if (localStorage.getItem('session')) {
            window.location.replace('dashboard.html');
        }
    </script>
</head>
<body class="dark-theme login-body">
    <div class="login-container">
        <div class="login-card-mate">
            <div class="login-header">
                <img src="AVANTI LOGO (1).jpeg" alt="Logo Avanti" class="logo-login">
                <h2 id="formTitle">Iniciar Sesión</h2>
                <p id="formSubtitle">Portal de Gestión de Actas y Equipos</p>
            </div>
            
            <!-- FORMULARIO DE INICIO DE SESIÓN -->
            <form id="loginForm">
                <div class="input-group-mate">
                    <label for="loginEmail">Correo Corporativo</label>
                    <input type="email" id="loginEmail" required>
                </div>
                <div class="input-group-mate">
                    <label for="loginPassword">Contraseña</label>
                    <input type="password" id="loginPassword" required>
                </div>
                <button type="submit" class="btn-avanti w-100">Ingresar al Portal</button>
                
                <div class="divider">o</div>
                
                <button type="button" id="btnGuest" class="btn-outline-mate w-100">👁️ Ingresar como Invitado</button>
                
                <p class="toggle-text">¿No tienes cuenta? <a href="#" id="showRegister">Regístrate aquí</a></p>
            </form>

            <!-- FORMULARIO DE REGISTRO -->
            <form id="registerForm" style="display: none;">
                <div class="input-group-mate">
                    <label for="regName">Nombre Completo</label>
                    <input type="text" id="regName" required>
                </div>
                <div class="input-group-mate">
                    <label for="regEmail">Correo Corporativo</label>
                    <input type="email" id="regEmail" required>
                </div>
                <div class="input-group-mate">
                    <label for="regPassword">Contraseña</label>
                    <input type="password" id="regPassword" required>
                </div>
                <button type="submit" class="btn-avanti w-100">Crear Cuenta</button>
                
                <p class="toggle-text">¿Ya tienes cuenta? <a href="#" id="showLogin">Inicia sesión</a></p>
            </form>
        </div>
    </div>

    <!-- LÓGICA DE AUTENTICACIÓN MEJORADA -->
    <script>
        // Función segura para obtener usuarios
        function getSafeUsers() {
            try {
                let db = JSON.parse(localStorage.getItem('usersDB'));
                if (!Array.isArray(db)) return [];
                return db;
            } catch (error) {
                return [];
            }
        }

        // Función segura para guardar usuarios
        function saveUsers(usersArray) {
            localStorage.setItem('usersDB', JSON.stringify(usersArray));
        }

        // Crear cuenta por defecto de Administrador si la base está vacía
        let users = getSafeUsers();
        if (users.length === 0) {
            users.push({ 
                name: 'Brayan Morales', 
                email: 'brayan@avanti.com', 
                password: 'admin', 
                role: 'admin' 
            });
            saveUsers(users);
        }

        // Referencias al DOM
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const showRegister = document.getElementById('showRegister');
        const showLogin = document.getElementById('showLogin');
        const formTitle = document.getElementById('formTitle');
        const btnGuest = document.getElementById('btnGuest');

        // Alternar vistas
        showRegister.addEventListener('click', (e) => {
            e.preventDefault();
            loginForm.style.display = 'none';
            registerForm.style.display = 'block';
            formTitle.textContent = 'Crear Cuenta';
        });

        showLogin.addEventListener('click', (e) => {
            e.preventDefault();
            registerForm.style.display = 'none';
            loginForm.style.display = 'block';
            formTitle.textContent = 'Iniciar Sesión';
        });

        // REGISTRO ROBUSTO
        registerForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            // Limpieza de datos (Quitar espacios y pasar a minúscula el correo)
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim().toLowerCase();
            const password = document.getElementById('regPassword').value;

            let currentDB = getSafeUsers();
            
            // Verificar si el correo ya existe
            if (currentDB.find(u => u.email === email)) {
                alert('Este correo ya se encuentra registrado. Intenta iniciar sesión.');
                return;
            }

            // Guardar nuevo usuario
            currentDB.push({ name, email, password, role: 'admin' });
            saveUsers(currentDB);
            
            alert('¡Cuenta creada con éxito! Ya puedes iniciar sesión con tus credenciales.');
            
            // Limpiar formulario y regresar a login
            registerForm.reset();
            showLogin.click();
        });

        // LOGIN ROBUSTO
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            // Limpieza del input de intento de login
            const email = document.getElementById('loginEmail').value.trim().toLowerCase();
            const password = document.getElementById('loginPassword').value;

            const currentDB = getSafeUsers();
            const validUser = currentDB.find(u => u.email === email && u.password === password);

            if (validUser) {
                // Crear sesión exitosa
                const session = { 
                    name: validUser.name, 
                    role: validUser.role, 
                    token: 'auth-' + Date.now() 
                };
                localStorage.setItem('session', JSON.stringify(session));
                window.location.replace('dashboard.html');
            } else {
                alert('Correo o contraseña incorrectos.');
            }
        });

        // INGRESO COMO INVITADO
        btnGuest.addEventListener('click', () => {
            const session = { 
                name: 'Invitado', 
                role: 'viewer', 
                token: 'guest-000' 
            };
            localStorage.setItem('session', JSON.stringify(session));
            window.location.replace('dashboard.html');
        });
    </script>
</body>
</html>
