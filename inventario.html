<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reportería e Inventario - Agrícola Avanti</title>
  <link rel="icon" type="image/jpeg" href="/AVANTI%20LOGO%20(1).jpeg">
  <script src="https://cdn.tailwindcss.com"></script>
  
  <link href="https://unpkg.com/tabulator-tables@5.5.0/dist/css/tabulator.min.css" rel="stylesheet">
  <script type="text/javascript" src="https://unpkg.com/tabulator-tables@5.5.0/dist/js/tabulator.min.js"></script>

  <style>
    body { background-color: #F4F6F9; font-family: 'Segoe UI', system-ui, sans-serif; color: #334155; }
    
    /* ESTILOS CORPORATIVOS TABULATOR (THEME LIGHT/CLEAN) */
    .tabulator { background-color: #FFFFFF !important; border: 1px solid #E2E8F0 !important; border-radius: 6px; font-size: 13px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
    .tabulator-header { background-color: #0E5A32 !important; color: #FFFFFF !important; font-weight: 600; border-bottom: 2px solid #0A3F23 !important; }
    .tabulator-col { background-color: #0E5A32 !important; border-right: 1px solid #107c41 !important; }
    .tabulator-col-title { padding: 12px 10px !important; }
    .tabulator-row { background-color: #FFFFFF !important; border-bottom: 1px solid #E2E8F0 !important; }
    .tabulator-row:nth-child(even) { background-color: #F8FAFC !important; }
    .tabulator-row:hover { background-color: #F1F5F9 !important; }
    .tabulator-cell { padding: 10px !important; }
    
    .tab-badge { padding: 4px 10px; border-radius: 4px; font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
    .t-op { background-color: #DCFCE7; color: #15803D; border: 1px solid #BBF7D0; }
    .t-ret { background-color: #FEE2E2; color: #B91C1C; border: 1px solid #FECACA; }
    .t-stk { background-color: #E0F2FE; color: #0369A1; border: 1px solid #BAE6FD; }
  </style>
</head>
<body class="p-6">

  <div class="max-w-[98%] mx-auto">
    <!-- CABECERA -->
    <div class="flex flex-col md:flex-row justify-between items-center mb-6 bg-white p-5 rounded-lg shadow-sm border border-gray-200">
      <div class="flex items-center gap-4">
        <img src="/AVANTI%20LOGO%20(1).jpeg" alt="Logo" class="w-12 h-12 rounded-full border border-gray-100 shadow-sm">
        <div>
          <h1 class="text-2xl font-bold text-green-900 tracking-tight">Control de Inventario TI</h1>
          <p class="text-sm text-gray-500">Gestión patrimonial y generación de actas en PDF</p>
        </div>
      </div>
      <button class="mt-4 md:mt-0 bg-gray-100 hover:bg-gray-200 text-gray-700 border border-gray-300 font-semibold py-2 px-4 rounded transition duration-200" onclick="location.href='index.html'">
        ← Volver al Dashboard
      </button>
    </div>

    <!-- PANEL DE BÚSQUEDA -->
    <div class="bg-white p-5 rounded-lg shadow-sm border border-gray-200 mb-6 flex flex-col md:flex-row gap-4 items-end">
      <div class="flex-1 w-full">
        <label class="block text-xs font-bold text-gray-500 uppercase mb-2">🔍 Buscar por Computador / Código</label>
        <input type="text" id="filtro-computador" class="w-full border border-gray-300 rounded-md px-4 py-2 text-sm focus:outline-none focus:border-green-600 focus:ring-1 focus:ring-green-600">
      </div>
      <div class="flex-1 w-full">
        <label class="block text-xs font-bold text-gray-500 uppercase mb-2">👤 Buscar por Usuario</label>
        <input type="text" id="filtro-usuario" class="w-full border border-gray-300 rounded-md px-4 py-2 text-sm focus:outline-none focus:border-green-600 focus:ring-1 focus:ring-green-600">
      </div>
      <div>
        <button id="btn-limpiar" class="bg-red-50 hover:bg-red-100 text-red-600 border border-red-200 font-semibold py-2 px-4 rounded-md text-sm transition duration-200">
          Limpiar Filtros
        </button>
      </div>
    </div>

    <!-- CONTENEDOR DEL GRID -->
    <div id="inventario-grid" class="w-full"></div>
  </div>

  <!-- ==========================================
       MODAL: VISOR DE EVIDENCIA FOTOGRÁFICA
       ========================================== -->
  <div id="evidencia_modal" class="fixed inset-0 bg-gray-900 bg-opacity-80 z-[9999] hidden items-center justify-center p-4 transition-opacity">
    <div class="bg-white rounded-lg max-w-4xl w-full overflow-hidden shadow-2xl flex flex-col">
      <div class="bg-green-900 text-white px-5 py-4 flex justify-between items-center">
        <h3 class="font-bold text-lg flex items-center gap-2">📸 Evidencia Fotográfica</h3>
        <button onclick="cerrarModalEvidencia()" class="text-white hover:text-red-400 font-bold text-3xl leading-none">&times;</button>
      </div>
      <div class="p-4 flex justify-center bg-gray-100 items-center" style="min-height: 50vh;">
        <img id="evidencia_img_full" src="" alt="Evidencia" class="max-h-[70vh] object-contain rounded shadow border border-gray-300 bg-white">
      </div>
      <div class="bg-gray-200 px-5 py-3 flex justify-end">
        <button onclick="cerrarModalEvidencia()" class="bg-gray-600 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded">Cerrar</button>
      </div>
    </div>
  </div>

  <script>
    let tablaInventario;

    // --- FUNCIONES DEL MODAL DE EVIDENCIA ---
    function abrirModalEvidencia(base64Src) {
      if (!base64Src) return;
      document.getElementById('evidencia_img_full').src = base64Src;
      document.getElementById('evidencia_modal').style.display = 'flex';
    }

    function cerrarModalEvidencia() {
      document.getElementById('evidencia_modal').style.display = 'none';
      document.getElementById('evidencia_img_full').src = "";
    }

    // Cerrar modal al hacer clic fuera de la imagen
    document.getElementById('evidencia_modal').addEventListener('click', function(e) {
      if(e.target === this) cerrarModalEvidencia();
    });

    document.addEventListener('DOMContentLoaded', async () => {
      document.getElementById('inventario-grid').innerHTML = "<div class='text-center p-10'><p class='text-gray-500 font-semibold'>Sincronizando con la Base de Datos Neon...</p></div>";

      try {
        const response = await fetch('/api/obtener-metricas');
        if (!response.ok) throw new Error('Error de red al consultar a la API');
        const data = await response.json();

        tablaInventario = new Tabulator("#inventario-grid", {
          data: data.inventario_total, 
          layout: "fitDataFill", 
          pagination: "local",
          paginationSize: 15,
          columns: [
            {
              title: "Evidencia", 
              formatter: function(cell) {
                const row = cell.getRow().getData();
                let html = '<div class="flex flex-col gap-1 w-full items-center">';
                let hasEvidencia = false;

                // Verificamos si existe evidencia de entrega
                if (row.evidencia_entrega && row.evidencia_entrega.length > 50) {
                  html += `<button class='btn-evi-ent bg-blue-50 hover:bg-blue-100 text-blue-700 border border-blue-200 px-2 py-1 rounded text-xs font-bold w-full transition'>📸 Entrega</button>`;
                  hasEvidencia = true;
                }
                
                // Verificamos si existe evidencia de devolución
                if (row.evidencia_devolucion && row.evidencia_devolucion.length > 50) {
                  html += `<button class='btn-evi-dev bg-purple-50 hover:bg-purple-100 text-purple-700 border border-purple-200 px-2 py-1 rounded text-xs font-bold w-full transition'>📸 Retorno</button>`;
                  hasEvidencia = true;
                }

                html += '</div>';
                
                return hasEvidencia ? html : "<span class='text-gray-400 text-xs text-center block w-full'>-</span>";
              }, 
              width: 110, 
              hozAlign: "center",
              headerSort: false,
              cellClick: function(e, cell) {
                const rowData = cell.getRow().getData();
                if (e.target.classList.contains('btn-evi-ent')) {
                  abrirModalEvidencia(rowData.evidencia_entrega);
                } else if (e.target.classList.contains('btn-evi-dev')) {
                  abrirModalEvidencia(rowData.evidencia_devolucion);
                }
              }
            },
            {
              title: "Acta PDF", 
              formatter: function(cell) {
                const row = cell.getRow().getData();
                if(row.id_acta) {
                  return `<button class='btn-pdf bg-red-600 hover:bg-red-700 text-white px-3 py-1.5 rounded text-xs font-bold w-full transition duration-150 flex items-center justify-center gap-1'><svg class="w-4 h-4 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg> PDF</button>`;
                }
                return "<span class='text-gray-400 text-xs text-center block w-full'>Sin Acta</span>";
              }, 
              width: 100, 
              hozAlign: "center",
              headerSort: false,
              cellClick: function(e, cell) {
                const rowData = cell.getRow().getData();
                if(rowData.id_acta && (e.target.classList.contains('btn-pdf') || e.target.closest('.btn-pdf'))) {
                  sessionStorage.setItem('acta_imprimir', JSON.stringify(rowData));
                  window.open(`gestion-actas.html?vista=${rowData.tipo_vista}&print=true`, '_blank');
                }
              }
            },
            { title: "Categoría", field: "categoria", width: 140 },
            { title: "Computador (Cód.)", field: "computador", width: 140 },
            { title: "Tipo Equipo", field: "tipo_equipo", width: 120 },
            { title: "Nº Serie / Teléfono", field: "numero_serie", width: 140 },
            { title: "Fabricante y Modelo", field: "marca_modelo", width: 180 },
            { title: "DNI", field: "dni", width: 90 },
            { title: "Nombre Empleado", field: "nombre_empleado", width: 180 },
            { title: "Correo Corp.", field: "correo_corp", width: 180 },
            { title: "Usuario PC", field: "usuario_pc", width: 120 },
            { title: "Oficio/Cargo", field: "oficio_cargo", width: 140 },
            { title: "Área", field: "area", width: 130 },
            { title: "Procesador", field: "procesador", width: 120 },
            { title: "Memoria RAM", field: "ram", width: 100 },
            { title: "Disco Duro", field: "disco_duro", width: 100 },
            { title: "Observaciones", field: "observaciones_entrega", width: 250 },
            { 
              title: "Estado Operativo", 
              field: "estado_operativo", 
              width: 130,
              hozAlign: "center",
              formatter: function(cell) {
                const val = cell.getValue();
                if(!val) return "";
                if(val === 'OPERATIVO' || val === 'ACTIVA') return `<span class="tab-badge t-op">${val}</span>`;
                if(val === 'RETIRADO' || val === 'SUSPENDIDA') return `<span class="tab-badge t-ret">${val}</span>`;
                return `<span class="tab-badge t-stk">${val}</span>`;
              }
            }
          ]
        });

      } catch (error) {
        document.getElementById('inventario-grid').innerHTML = `<div class='bg-red-50 border border-red-200 text-red-600 p-4 rounded-md mx-auto max-w-lg mt-10 text-center font-bold'>Error al cargar inventario: ${error.message}</div>`;
      }
    });

    // --- LÓGICA DE FILTROS PERSONALIZADOS ---
    function actualizarFiltros() {
      const valComputador = document.getElementById("filtro-computador").value;
      const valUsuario = document.getElementById("filtro-usuario").value;

      tablaInventario.setFilter([
        { field: "computador", type: "like", value: valComputador },
        { field: "nombre_empleado", type: "like", value: valUsuario }
      ]);
    }

    document.getElementById("filtro-computador").addEventListener("keyup", actualizarFiltros);
    document.getElementById("filtro-usuario").addEventListener("keyup", actualizarFiltros);

    document.getElementById("btn-limpiar").addEventListener("click", () => {
      document.getElementById("filtro-computador").value = "";
      document.getElementById("filtro-usuario").value = "";
      tablaInventario.clearFilter();
    });
  </script>
</body>
</html>
