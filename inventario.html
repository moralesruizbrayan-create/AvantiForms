<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reportería e Inventario - Agrícola Avanti</title>
  <link rel="icon" type="image/jpeg" href="/AVANTI%20LOGO%20(1).jpeg">
  <script src="https://cdn.tailwindcss.com"></script>
  
  <link href="https://unpkg.com/tabulator-tables@5.5.0/dist/css/tabulator.min.css" rel="stylesheet">
  <script type="text/javascript" src="https://unpkg.com/tabulator-tables@5.5.0/dist/js/tabulator.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    
    body { background-color: #F3F4F6; font-family: 'Inter', system-ui, sans-serif; color: #334155; }
    
    /* ESTILOS CORPORATIVOS SAAS PARA TABULATOR */
    .tabulator { border: none !important; background-color: transparent !important; font-size: 13px; }
    .tabulator-header { background-color: #1E293B !important; color: #F8FAFC !important; font-weight: 500; border-bottom: none !important; border-top-left-radius: 8px; border-top-right-radius: 8px; }
    .tabulator-col { background-color: transparent !important; border-right: none !important; padding: 6px 4px !important; }
    .tabulator-col-title { font-weight: 600 !important; font-size: 12.5px; letter-spacing: 0.3px; }
    
    .tabulator-row { background-color: #FFFFFF !important; border-bottom: 1px solid #F1F5F9 !important; transition: background-color 0.2s ease; }
    .tabulator-row:nth-child(even) { background-color: #FAFAFA !important; }
    .tabulator-row:hover { background-color: #F1F5F9 !important; }
    .tabulator-cell { border-right: none !important; padding: 14px 10px !important; vertical-align: middle !important; }
    
    /* ESTILOS DE BADGES (ESTADO) */
    .tab-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 20px; font-size: 11.5px; font-weight: 600; text-transform: capitalize; }
    .tab-badge::before { content: ""; display: block; width: 6px; height: 6px; border-radius: 50%; }
    .t-op { background-color: #DCFCE7; color: #15803D; }
    .t-op::before { background-color: #15803D; }
    .t-ret { background-color: #FEE2E2; color: #B91C1C; }
    .t-ret::before { background-color: #B91C1C; }
    .t-stk { background-color: #E0F2FE; color: #0369A1; }
    .t-stk::before { background-color: #0369A1; }

    /* BOTONES DE ACCIÓN (ICONOS) */
    .action-btn { display: inline-flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 6px; border: 1px solid transparent; transition: all 0.2s ease; cursor: pointer; background: white; }
    .btn-pdf { color: #059669; border-color: #A7F3D0; }
    .btn-pdf:hover { background: #D1FAE5; }
    .btn-evi { color: #0284C7; border-color: #BAE6FD; }
    .btn-evi:hover { background: #E0F2FE; }
    .btn-del { color: #DC2626; border-color: #FECACA; }
    .btn-del:hover { background: #FEE2E2; }
    .btn-disabled { color: #94A3B8; background: transparent; cursor: not-allowed; opacity: 0.5; border-color: #E2E8F0; }

    .tabulator-tableholder::-webkit-scrollbar { height: 8px; width: 8px; }
    .tabulator-tableholder::-webkit-scrollbar-track { background: #F1F5F9; border-radius: 4px; }
    .tabulator-tableholder::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 4px; }
    .tabulator-tableholder::-webkit-scrollbar-thumb:hover { background: #94A3B8; }
  </style>
</head>
<body class="p-4 md:p-8">

  <div class="max-w-[1400px] mx-auto space-y-6">
    
    <!-- CABECERA -->
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center bg-white p-6 rounded-xl shadow-sm border border-gray-100">
      <div class="flex items-center gap-4">
        <div class="p-2 bg-gray-50 rounded-lg border border-gray-100">
          <img src="/AVANTI%20LOGO%20(1).jpeg" alt="Logo" class="w-10 h-10 object-contain mix-blend-multiply">
        </div>
        <div>
          <h1 class="text-xl font-bold text-gray-800 tracking-tight">Control de TI</h1>
          <p class="text-sm text-gray-500 font-medium mt-0.5">Gestión de inventario e impresión de actas</p>
        </div>
      </div>
      <div class="mt-4 md:mt-0 flex w-full md:w-auto gap-3">
        <button class="w-full md:w-auto flex items-center justify-center gap-2 bg-white hover:bg-gray-50 text-gray-700 border border-gray-300 font-medium py-2 px-4 rounded-lg text-sm transition duration-200 shadow-sm" onclick="location.href='index.html'">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        </button>
      </div>
    </div>

    <!-- PANEL DE BÚSQUEDA Y FILTROS -->
    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
      <div class="flex flex-col lg:flex-row gap-5 items-end">
        <div class="flex-1 w-full">
          <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-2">Código o Serie</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
            <input type="text" id="filtro-computador" class="w-full border border-gray-200 rounded-lg pl-10 pr-4 py-2.5 text-sm text-gray-700 focus:outline-none focus:border-green-600 focus:ring-1 focus:ring-green-600 transition">
          </div>
        </div>
        
        <div class="flex-1 w-full">
          <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-2">Empleado Asignado</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            </div>
            <input type="text" id="filtro-usuario" class="w-full border border-gray-200 rounded-lg pl-10 pr-4 py-2.5 text-sm text-gray-700 focus:outline-none focus:border-green-600 focus:ring-1 focus:ring-green-600 transition">
          </div>
        </div>

        <div class="flex-1 w-full">
          <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wide mb-2">Categoría</label>
          <select id="filtro-categoria" class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm text-gray-700 focus:outline-none focus:border-green-600 focus:ring-1 focus:ring-green-600 bg-white">
            <option value="">Todas</option>
            <option value="PCs">PCs</option>
            <option value="Teléfono Móvil">Teléfono Móvil</option>
            <option value="Periférico">Periférico</option>
            <option value="Línea Móvil">Línea Móvil</option>
          </select>
        </div>

        <div class="w-full lg:w-auto mt-2 lg:mt-0">
          <button id="btn-limpiar" class="flex items-center justify-center w-full lg:w-auto bg-white hover:bg-gray-50 text-gray-600 border border-gray-300 font-medium py-2.5 px-6 rounded-lg text-sm transition duration-200 shadow-sm">
            Resetear
          </button>
        </div>
      </div>
    </div>

    <!-- CONTENEDOR DEL GRID -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
      <div id="inventario-grid" class="w-full"></div>
    </div>

  </div>

  <!-- MODAL: VISOR DE EVIDENCIA -->
  <div id="evidencia_modal" class="fixed inset-0 bg-slate-900 bg-opacity-70 backdrop-blur-sm z-[9999] hidden items-center justify-center p-4 transition-opacity">
    <div class="bg-white rounded-2xl max-w-4xl w-full overflow-hidden shadow-2xl flex flex-col transform transition-all">
      <div class="bg-white border-b border-gray-100 px-6 py-4 flex justify-between items-center">
        <h3 class="font-bold text-gray-800 text-lg flex items-center gap-2">
          <svg class="w-5 h-5 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
          Evidencia Fotográfica
        </h3>
        <button onclick="cerrarModalEvidencia()" class="text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-lg p-1 transition-colors">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
      </div>
      <div class="p-6 flex justify-center bg-gray-50 items-center" style="min-height: 50vh;">
        <img id="evidencia_img_full" src="" alt="Evidencia" class="max-h-[65vh] object-contain rounded-lg shadow-sm border border-gray-200 bg-white p-2">
      </div>
    </div>
  </div>

  <script>
    let tablaInventario;

    function abrirModalEvidencia(base64Src) {
      if (!base64Src) return;
      document.getElementById('evidencia_img_full').src = base64Src;
      document.getElementById('evidencia_modal').style.display = 'flex';
    }

    function cerrarModalEvidencia() {
      document.getElementById('evidencia_modal').style.display = 'none';
      document.getElementById('evidencia_img_full').src = "";
    }

    document.getElementById('evidencia_modal').addEventListener('click', function(e) {
      if(e.target === this) cerrarModalEvidencia();
    });

    const iconPDF = `<svg class="w-4 h-4 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>`;
    const iconCamera = `<svg class="w-4 h-4 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>`;
    const iconTrash = `<svg class="w-4 h-4 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>`;

    document.addEventListener('DOMContentLoaded', async () => {
      document.getElementById('inventario-grid').innerHTML = "<div class='flex flex-col items-center justify-center p-16 text-gray-500'><svg class='animate-spin h-8 w-8 mb-4 text-green-600' xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 24 24'><circle class='opacity-25' cx='12' cy='12' r='10' stroke='currentColor' stroke-width='4'></circle><path class='opacity-75' fill='currentColor' d='M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z'></path></svg><p class='font-medium'>Sincronizando con la Base de Datos...</p></div>";

      try {
        const response = await fetch('/api/obtener-metricas');
        if (!response.ok) throw new Error('Error de red al consultar a la API');
        const data = await response.json();

        data.inventario_total = data.inventario_total.map(item => {
            if (item.categoria === 'Material Informático') item.categoria = 'PCs';
            return item;
        });

        tablaInventario = new Tabulator("#inventario-grid", {
          data: data.inventario_total, 
          layout: "fitColumns", 
          responsiveLayout: "collapse",
          pagination: "local",
          paginationSize: 10,
          paginationSizeSelector: [10, 25, 50, 100],
          columns: [
            {
              title: "Acciones", 
              width: 140, 
              hozAlign: "center",
              headerSort: false,
              formatter: function(cell) {
                const row = cell.getRow().getData();
                let html = '<div class="flex items-center justify-center gap-1.5">';
                
                // Botón Documento PDF
                if(row.id_acta) html += `<button class='action-btn btn-pdf' title='Ver Acta PDF'>${iconPDF}</button>`;
                else html += `<button class='action-btn btn-disabled' disabled>${iconPDF}</button>`;

                // Botón Fotos Evidencia
                if ((row.evidencia_entrega && row.evidencia_entrega.length > 50) || (row.evidencia_devolucion && row.evidencia_devolucion.length > 50)) {
                  html += `<button class='action-btn btn-evi' title='Ver Evidencia Fotográfica'>${iconCamera}</button>`;
                } else {
                  html += `<button class='action-btn btn-disabled' disabled>${iconCamera}</button>`;
                }

                // Botón Borrar Registro Permanente
                html += `<button class='action-btn btn-del' title='Eliminar de Base de Datos'>${iconTrash}</button>`;

                html += '</div>';
                return html;
              },
              cellClick: function(e, cell) {
                const rowData = cell.getRow().getData();
                
                // Acción Abrir PDF
                if(e.target.closest('.btn-pdf')) {
                  sessionStorage.setItem('acta_imprimir', JSON.stringify(rowData));
                  window.open(`gestion-actas.html?vista=${rowData.tipo_vista}&print=true`, '_blank');
                }
                
                // Acción Abrir Imagen
                if(e.target.closest('.btn-evi')) {
                  if(rowData.evidencia_devolucion && rowData.evidencia_devolucion.length > 50) {
                    abrirModalEvidencia(rowData.evidencia_devolucion);
                  } else {
                    abrirModalEvidencia(rowData.evidencia_entrega);
                  }
                }

                // Acción Eliminar Registro
                if(e.target.closest('.btn-del')) {
                  if(confirm("⚠️ ¿Estás completamente seguro de eliminar este registro?\n\nEsta acción borrará el equipo del inventario, destruirá sus historiales, firmas y la hoja de asignación de manera irreversible.")) {
                     eliminarRegistro(rowData, cell.getRow());
                  }
                }
              }
            },
            { title: "Categoría", field: "categoria", width: 140 },
            { title: "Empleado", field: "nombre_empleado", width: 220, formatter: function(cell) {
                let name = cell.getValue();
                let email = cell.getRow().getData().correo_corp || "Sin correo asignado";
                if(!name) return `<span class="text-gray-400 italic">No asignado</span>`;
                return `<div class="font-medium text-gray-800">${name}</div><div class="text-xs text-gray-500 mt-0.5">${email}</div>`;
              }
            },
            { title: "Departamento", field: "area", width: 160 },
            { title: "CPU", field: "computador", width: 130, formatter: function(cell){ return cell.getValue() || "-"; } },
            { title: "Nº Serie", field: "numero_serie", width: 140 },
            { title: "Marca y Modelo", field: "marca_modelo", width: 200, formatter: function(cell) {
                let text = cell.getValue();
                return text ? `<div class="truncate w-full" title="${text}">${text}</div>` : "-";
              }
            },
            { 
              title: "Estado", 
              field: "estado_operativo", 
              width: 130,
              hozAlign: "left",
              formatter: function(cell) {
                const val = cell.getValue();
                if(!val) return "";
                if(val === 'OPERATIVO' || val === 'ACTIVA') return `<span class="tab-badge t-op">Activo</span>`;
                if(val === 'RETIRADO' || val === 'SUSPENDIDA') return `<span class="tab-badge t-ret">Inactivo</span>`;
                return `<span class="tab-badge t-stk">Stock</span>`;
              }
            }
          ]
        });

      } catch (error) {
        document.getElementById('inventario-grid').innerHTML = `<div class='bg-red-50 border border-red-200 text-red-600 p-4 rounded-lg mx-auto max-w-lg mt-10 text-center font-medium shadow-sm'>Error al cargar inventario: ${error.message}</div>`;
      }
    });

    // Función que conecta el Front-End con la API de Borrado
    async function eliminarRegistro(rowData, rowNode) {
      try {
        const res = await fetch('/api/eliminar-registro', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(rowData)
        });
        
        const data = await res.json();
        if (res.ok && data.success) {
          rowNode.delete(); // Borra visualmente la fila de la tabla sin necesidad de recargar la página
          alert("✅ El equipo ha sido eliminado del sistema con éxito.");
        } else {
          alert("❌ Hubo un error al eliminar: " + data.error);
        }
      } catch(e) {
        alert("❌ Error de red. No se pudo conectar con el servidor Neon.");
      }
    }

    function actualizarFiltros() {
      const valComputador = document.getElementById("filtro-computador").value;
      const valUsuario = document.getElementById("filtro-usuario").value;
      const valCategoria = document.getElementById("filtro-categoria").value;

      tablaInventario.setFilter([
        { field: "computador", type: "like", value: valComputador },
        { field: "nombre_empleado", type: "like", value: valUsuario },
        { field: "categoria", type: "like", value: valCategoria }
      ]);
    }

    document.getElementById("filtro-computador").addEventListener("keyup", actualizarFiltros);
    document.getElementById("filtro-usuario").addEventListener("keyup", actualizarFiltros);
    document.getElementById("filtro-categoria").addEventListener("change", actualizarFiltros);

    document.getElementById("btn-limpiar").addEventListener("click", () => {
      document.getElementById("filtro-computador").value = "";
      document.getElementById("filtro-usuario").value = "";
      document.getElementById("filtro-categoria").value = "";
      tablaInventario.clearFilter();
    });
  </script>
</body>
</html>
