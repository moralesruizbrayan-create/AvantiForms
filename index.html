<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Avanti Soporte TI</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/jpeg" href="AVANTI LOGO (1).jpeg">
    
    <script>
        // Si ya hay sesión, redirigir al dashboard
        if (localStorage.getItem('session')) {
            window.location.replace('dashboard.html');
        }
    </script>
</head>
<body class="dark-theme login-body">
    <div class="login-container">
        <div class="login-card-mate">
            <div class="login-header">
                <img src="AVANTI LOGO (1).jpeg" alt="Logo Avanti" class="logo-login">
                <h2 id="formTitle">Iniciar Sesión</h2>
                <p id="formSubtitle">Portal de Gestión de Actas y Equipos</p>
            </div>
            
            <!-- FORMULARIO DE INICIO DE SESIÓN -->
            <form id="loginForm">
                <div class="input-group-mate">
                    <label for="loginEmail">Correo Corporativo</label>
                    <input type="email" id="loginEmail" required>
                </div>
                <div class="input-group-mate">
                    <label for="loginPassword">Contraseña</label>
                    <input type="password" id="loginPassword" required>
                </div>
                <button type="submit" class="btn-avanti w-100">Ingresar al Portal</button>
                
                <div class="divider">o</div>
                
                <button type="button" id="btnGuest" class="btn-outline-mate w-100">👁️ Ingresar como Invitado</button>
                
                <p class="toggle-text">¿No tienes cuenta? <a href="#" id="showRegister">Regístrate aquí</a></p>
            </form>

            <!-- FORMULARIO DE REGISTRO (Oculto por defecto) -->
            <form id="registerForm" style="display: none;">
                <div class="input-group-mate">
                    <label for="regName">Nombre Completo</label>
                    <input type="text" id="regName" required>
                </div>
                <div class="input-group-mate">
                    <label for="regEmail">Correo Corporativo</label>
                    <input type="email" id="regEmail" required>
                </div>
                <div class="input-group-mate">
                    <label for="regPassword">Contraseña</label>
                    <input type="password" id="regPassword" required>
                </div>
                <button type="submit" class="btn-avanti w-100">Crear Cuenta</button>
                
                <p class="toggle-text">¿Ya tienes cuenta? <a href="#" id="showLogin">Inicia sesión</a></p>
            </form>
        </div>
    </div>

    <!-- LÓGICA DE AUTENTICACIÓN Y REGISTRO -->
    <script>
        // Elementos del DOM
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const showRegister = document.getElementById('showRegister');
        const showLogin = document.getElementById('showLogin');
        const formTitle = document.getElementById('formTitle');
        const btnGuest = document.getElementById('btnGuest');

        // Inicializar base de datos simulada de usuarios si no existe
        if (!localStorage.getItem('usersDB')) {
            localStorage.setItem('usersDB', JSON.stringify([]));
        }

        // Alternar entre Login y Registro
        showRegister.addEventListener('click', (e) => {
            e.preventDefault();
            loginForm.style.display = 'none';
            registerForm.style.display = 'block';
            formTitle.textContent = 'Crear Cuenta';
        });

        showLogin.addEventListener('click', (e) => {
            e.preventDefault();
            registerForm.style.display = 'none';
            loginForm.style.display = 'block';
            formTitle.textContent = 'Iniciar Sesión';
        });

        // Procesar Registro
        registerForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;

            const users = JSON.parse(localStorage.getItem('usersDB'));
            
            if (users.find(u => u.email === email)) {
                alert('Este correo ya está registrado.');
                return;
            }

            // Guardar nuevo usuario (Rol: Administrador por defecto al registrarse)
            users.push({ name, email, password, role: 'admin' });
            localStorage.setItem('usersDB', JSON.stringify(users));
            
            alert('Cuenta creada exitosamente. Ahora puedes iniciar sesión.');
            showLogin.click(); // Volver al login
        });

        // Procesar Login
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            const users = JSON.parse(localStorage.getItem('usersDB'));
            const user = users.find(u => u.email === email && u.password === password);

            if (user) {
                // Crear sesión de administrador
                const session = { name: user.name, role: user.role, token: 'auth-token-123' };
                localStorage.setItem('session', JSON.stringify(session));
                window.location.replace('dashboard.html');
            } else {
                alert('Correo o contraseña incorrectos.');
            }
        });

        // Procesar Ingreso como Invitado
        btnGuest.addEventListener('click', () => {
            // Crear sesión de invitado (Solo lectura)
            const session = { name: 'Invitado', role: 'viewer', token: 'guest-token-000' };
            localStorage.setItem('session', JSON.stringify(session));
            window.location.replace('dashboard.html');
        });
    </script>
</body>
</html>
