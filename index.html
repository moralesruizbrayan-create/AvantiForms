<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Avanti</title>
    <!-- Tus estilos de login actuales aquí -->
</head>
<body>
    
    <!-- Tu formulario de login actual -->
    <form id="loginForm">
        <!-- ... inputs ... -->
        <button type="submit">Iniciar Sesión</button>
    </form>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Aquí va tu validación (fetch a tu backend, etc.)
            const loginExitoso = true; // Simulación
            
            if (loginExitoso) {
                // Guardar la sesión (ejemplo con localStorage)
                localStorage.setItem('isAuthenticated', 'true');
                
                // CORRECCIÓN: Usar replace en lugar de href
                window.location.replace('dashboard.html');
            }
        });
    </script>
</body>
</html>
