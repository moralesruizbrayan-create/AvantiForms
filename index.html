<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Avanti Soporte TI</title>
    <link rel="stylesheet" href="styles.css">
    
    <!-- Ícono de la pestaña -->
    <link rel="icon" type="image/jpeg" href="AVANTI LOGO (1).jpeg">
    
    <script>
        if (localStorage.getItem('token')) {
            window.location.replace('dashboard.html');
        }
    </script>
</head>
<body class="dark-theme login-body">
    <div class="login-container">
        <div class="login-card-mate">
            <div class="login-header">
                <img src="AVANTI LOGO (1).jpeg" alt="Logo Avanti" class="logo-login">
                <h2>Iniciar Sesión</h2>
                <p>Portal de Gestión de Actas y Equipos</p>
            </div>
            
            <form id="loginForm">
                <div class="input-group-mate">
                    <label for="email">Correo Corporativo</label>
                    <!-- Sin placeholders -->
                    <input type="email" id="email" required>
                </div>
                <div class="input-group-mate">
                    <label for="password">Contraseña</label>
                    <!-- Sin placeholders -->
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn-avanti w-100">Ingresar al Portal</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            // Validación simulada
            const loginExitoso = true; 
            if (loginExitoso) {
                localStorage.setItem('token', 'autenticado');
                window.location.replace('dashboard.html');
            }
        });
    </script>
</body>
</html>
