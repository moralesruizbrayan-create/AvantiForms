<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso - Agrícola Avanti</title>
  <link rel="icon" type="image/jpeg" href="/AVANTI%20LOGO%20(1).jpeg">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
    
    body { font-family: 'Inter', sans-serif; background-color: #E2E8F0; }
    
    /* INPUTS MINIMALISTAS TIPO MATERIAL DESIGN */
    .input-line {
      border: none;
      border-bottom: 2px solid #E2E8F0;
      border-radius: 0;
      background: transparent;
      padding-left: 4px;
      padding-right: 30px;
    }
    .input-line:focus {
      outline: none;
      border-bottom-color: #16A34A;
      box-shadow: none;
    }
    
    /* ICONO DE CHECK DINÁMICO (Requiere un placeholder vacío en el HTML para funcionar) */
    .input-line:valid:not(:placeholder-shown) + .check-icon {
      opacity: 1;
      transform: scale(1);
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 sm:p-8 relative">
  <!-- Fondo Decorativo -->
  <div class="fixed inset-0 z-0 pointer-events-none opacity-5 bg-[url('/AVANTI%20LOGO%20(1).jpeg')] bg-no-repeat bg-center bg-[length:800px]"></div>

  <!-- TARJETA PRINCIPAL -->
  <div class="w-full max-w-5xl bg-white rounded-[2rem] shadow-2xl overflow-hidden flex flex-col md:flex-row relative z-10">
    
    <!-- PANEL IZQUIERDO (Verde Avanti) -->
    <div class="w-full md:w-5/12 bg-gradient-to-br from-green-600 to-green-700 p-10 md:p-12 text-white flex flex-col justify-center items-center relative overflow-hidden min-h-[300px] md:min-h-0">
      
      <!-- NUBES DESKTOP (Separador Derecho) -->
      <svg class="absolute hidden md:block right-0 top-0 h-full w-20 text-white translate-x-[1px]" preserveAspectRatio="none" viewBox="0 0 100 100" fill="currentColor">
        <path d="M100,0 L100,100 L0,100 C 40,90 -10,80 30,70 C -20,60 40,50 10,40 C 50,30 -10,20 30,10 C -20,5 40,0 100,0 Z"></path>
      </svg>
      
      <!-- NUBES MOBILE (Separador Inferior) -->
      <svg class="absolute block md:hidden bottom-0 left-0 w-full h-12 text-white translate-y-[1px]" preserveAspectRatio="none" viewBox="0 0 100 100" fill="currentColor">
        <path d="M0,100 L100,100 L100,0 C 90,40 80,-10 70,30 C 60,-20 50,40 40,10 C 30,50 20,-10 10,30 C 5,-20 0,40 0,100 Z"></path>
      </svg>

      <!-- Contenido Izquierdo -->
      <div class="relative z-10 text-center mt-[-20px] md:mt-0">
        <h3 class="text-lg font-medium text-green-100 mb-6 tracking-wide">Bienvenido a</h3>
        <div class="bg-white p-3 rounded-full inline-block shadow-xl shadow-green-900/20 mb-5">
          <img src="/AVANTI%20LOGO%20(1).jpeg" alt="Avanti Logo" class="w-20 h-20 object-contain mix-blend-multiply">
        </div>
        <h1 class="text-3xl font-extrabold tracking-tight mb-4">Avanti Forms</h1>
        <div class="w-12 h-1 bg-green-400 mx-auto rounded-full mb-6"></div>
        <p class="text-base font-medium text-green-50 px-2 leading-relaxed opacity-90">
          Agrícola Avanti S.A.C.
        </p>
      </div>
    </div>

    <!-- PANEL DERECHO (Formulario Blanco) -->
    <div class="w-full md:w-7/12 p-8 sm:p-12 lg:p-16 relative bg-white flex flex-col justify-center">
      <h2 id="form-title" class="text-2xl sm:text-3xl font-extrabold text-slate-800 mb-8 text-center md:text-left tracking-tight">Iniciar Sesión</h2>

      <form id="auth-form" class="space-y-7 max-w-sm mx-auto md:mx-0">
         
         <!-- Campo: Nombre (Oculto en Login) -->
         <div id="name-container" class="hidden relative">
           <label class="block text-[11px] font-bold text-slate-700 mb-1">Nombre Completo</label>
           <div class="relative">
             <input type="text" id="nombre" placeholder=" " class="input-line w-full py-2 text-sm text-slate-800 transition-colors" autocomplete="off">
             <svg class="check-icon w-4 h-4 text-green-500 absolute right-1 bottom-3 opacity-0 transform scale-50 transition-all duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
           </div>
         </div>

         <!-- Campo: Correo -->
         <div class="relative">
           <label class="block text-[11px] font-bold text-slate-700 mb-1">Correo Electrónico</label>
           <div class="relative">
             <input type="email" id="correo" required placeholder=" " class="input-line w-full py-2 text-sm text-slate-800 transition-colors">
             <svg class="check-icon w-4 h-4 text-green-500 absolute right-1 bottom-3 opacity-0 transform scale-50 transition-all duration-300 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
           </div>
         </div>

         <!-- Campo: Contraseña -->
         <div class="relative">
           <label class="block text-[11px] font-bold text-slate-700 mb-1">Contraseña</label>
           <div class="relative">
             <input type="password" id="password" required placeholder=" " class="input-line w-full py-2 text-sm text-slate-800 transition-colors">
             <svg class="check-icon w-4 h-4 text-green-500 absolute right-1 bottom-3 opacity-0 transform scale-50 transition-all duration-300 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
           </div>
         </div>

         <!-- Checkbox: Términos (Oculto en Login) -->
         <div id="terms-container" class="hidden items-center mt-2">
           <input type="checkbox" id="terms" class="w-3.5 h-3.5 text-green-600 bg-slate-100 border-slate-300 rounded focus:ring-green-500 cursor-pointer">
           <label for="terms" class="ml-2 text-[11px] text-slate-500 cursor-pointer">Al registrarte, aceptas nuestros <a href="#" class="text-green-600 font-bold hover:underline">Términos & Condiciones</a></label>
         </div>

         <!-- Mensaje de Error (API) -->
         <div id="error-msg" class="hidden text-xs font-bold text-red-600 bg-red-50 border border-red-200 p-3 rounded-lg text-center mt-2"></div>

         <!-- BOTONES (Switcher) -->
         <div class="flex flex-col sm:flex-row gap-4 pt-4">
           <!-- Botón Principal (Submit) -->
           <button type="submit" id="btn-submit" class="w-full sm:w-1/2 bg-green-600 text-white rounded-full py-3.5 text-sm font-bold shadow-lg shadow-green-600/30 hover:bg-green-700 hover:shadow-green-600/50 transition-all transform hover:-translate-y-0.5">
             Iniciar Sesión
           </button>
           
           <!-- Botón Secundario (Cambiar Modo) -->
           <button type="button" id="btn-toggle" class="w-full sm:w-1/2 bg-white text-slate-600 border-2 border-slate-200 rounded-full py-3.5 text-sm font-bold hover:border-slate-300 hover:bg-slate-50 hover:text-slate-800 transition-all">
             Registrarse
           </button>
         </div>
      </form>

      <!-- BOTÓN DE INVITADO -->
      <div class="mt-10 max-w-sm mx-auto md:mx-0 border-t border-slate-100 pt-6 text-center md:text-left">
        <button type="button" onclick="location.href='inventario.html'" class="inline-flex items-center gap-2 text-xs font-bold text-slate-400 hover:text-green-600 uppercase tracking-wide transition-colors group">
          <span class="bg-slate-100 p-1.5 rounded-full group-hover:bg-green-50 transition-colors">
             <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
          </span>
          Ingresar como Invitado al Inventario
        </button>
      </div>

    </div>
  </div>

  <script>
    // Variables de Estado
    let isLogin = true;
    const form = document.getElementById('auth-form');
    const title = document.getElementById('form-title');
    const nameContainer = document.getElementById('name-container');
    const termsContainer = document.getElementById('terms-container');
    const btnSubmit = document.getElementById('btn-submit');
    const btnToggle = document.getElementById('btn-toggle');
    const errorMsg = document.getElementById('error-msg');
    const nombreInput = document.getElementById('nombre');
    const termsInput = document.getElementById('terms');

    // Comprobar si ya existe una sesión abierta (Redirige al Dashboard)
    if(localStorage.getItem('avanti_user')) {
        window.location.href = 'dashboard.html';
    }

    // Lógica para alternar entre "Login" y "Registro"
    btnToggle.addEventListener('click', () => {
      isLogin = !isLogin;
      errorMsg.classList.add('hidden'); // Limpiar errores al cambiar
      form.reset(); // Limpiar campos

      if (isLogin) {
        // MODO: INICIAR SESIÓN
        title.innerText = 'Iniciar Sesión';
        nameContainer.classList.add('hidden');
        termsContainer.classList.add('hidden');
        nombreInput.required = false;
        termsInput.required = false;
        
        btnSubmit.innerText = 'Iniciar Sesión';
        btnToggle.innerText = 'Registrarse';
      } else {
        // MODO: REGISTRO
        title.innerText = 'Crear tu cuenta';
        nameContainer.classList.remove('hidden');
        termsContainer.classList.remove('hidden');
        termsContainer.classList.add('flex');
        nombreInput.required = true;
        termsInput.required = true;
        
        btnSubmit.innerText = 'Registrarse';
        btnToggle.innerText = 'Iniciar Sesión';
      }
    });

    // Enviar datos a la API de Neon PostgreSQL
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const textoOriginal = btnSubmit.innerText;
      btnSubmit.innerText = "⏳ Procesando...";
      btnSubmit.disabled = true;
      errorMsg.classList.add('hidden');

      const payload = {
        action: isLogin ? 'login' : 'register',
        correo: document.getElementById('correo').value,
        password: document.getElementById('password').value,
        nombre: nombreInput.value
      };

      try {
        const res = await fetch('/api/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        
        const data = await res.json();

        if (res.ok && data.success) {
          if (isLogin) {
            // Guardar sesión en navegador y llevar al Dashboard
            localStorage.setItem('avanti_user', JSON.stringify(data.user));
            window.location.href = 'dashboard.html';
          } else {
            // Registro exitoso, pasar a la vista de Login automáticamente
            alert("¡Cuenta creada exitosamente! Por favor, inicia sesión.");
            btnToggle.click(); 
          }
        } else {
          // Mostrar Error del servidor (ej. Contraseña incorrecta, correo ya usado)
          errorMsg.innerText = data.error;
          errorMsg.classList.remove('hidden');
        }
      } catch (err) {
        errorMsg.innerText = "Error crítico de conexión al servidor de la Base de Datos.";
        errorMsg.classList.remove('hidden');
      } finally {
        btnSubmit.innerText = textoOriginal;
        btnSubmit.disabled = false;
      }
    });
  </script>
</body>
</html>
