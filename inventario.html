<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reportería e Inventario - Agrícola Avanti</title>
  <link rel="icon" type="image/jpeg" href="/AVANTI%20LOGO%20(1).jpeg">
  <script src="https://cdn.tailwindcss.com"></script>
  
  <link href="https://unpkg.com/tabulator-tables@5.5.0/dist/css/tabulator.min.css" rel="stylesheet">
  <script type="text/javascript" src="https://unpkg.com/tabulator-tables@5.5.0/dist/js/tabulator.min.js"></script>

  <style>
    body { background-color: #121212; color: #E2E8F0; font-family: 'Segoe UI', system-ui, sans-serif; }
    
    .tabulator { background-color: #1E1E1E !important; border: 1px solid #2D2D2D !important; border-radius: 4px; color: #E2E8F0 !important; font-size: 13px; }
    .tabulator-header { background-color: #0E5A32 !important; color: #FFFFFF !important; border-bottom: 2px solid #0A3F23 !important; }
    .tabulator-col { background-color: #0E5A32 !important; border-right: 1px solid #0A3F23 !important; }
    .tabulator-row { background-color: #1E1E1E !important; border-bottom: 1px solid #2D2D2D !important; }
    .tabulator-row:nth-child(even) { background-color: #262626 !important; }
    .tabulator-row:hover { background-color: #2D2D2D !important; }
    
    .tab-badge { padding: 4px 8px; border-radius: 2px; font-size: 10px; font-weight: 700; text-transform: uppercase; }
    .t-op { background-color: #064e3b; color: #34d399; border: 1px solid #059669; }
    .t-ret { background-color: #7f1d1d; color: #f87171; border: 1px solid #dc2626; }
    .t-stk { background-color: #0c4a6e; color: #38bdf8; border: 1px solid #0284c7; }
  </style>
</head>
<body class="p-6">

  <div class="max-w-[95%] mx-auto">
    <div class="flex justify-between items-center mb-6 border-b border-gray-700 pb-4">
      <div>
        <h1 class="text-2xl font-bold text-green-500 uppercase tracking-wide">Control de Inventario TI</h1>
        <p class="text-sm text-gray-400">Motor de edición en celda conectado a Neon DB. Use los filtros en las cabeceras.</p>
      </div>
      <button class="bg-gray-700 hover:bg-gray-600 text-white font-semibold py-2 px-4 rounded shadow" onclick="location.href='index.html'">
        ← Volver al Dashboard
      </button>
    </div>

    <!-- CONTENEDOR DEL GRID -->
    <div id="inventario-grid" class="shadow-lg"></div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      document.getElementById('inventario-grid').innerHTML = "<p class='p-4 text-gray-400'>Consultando a la Base de Datos Neon...</p>";

      try {
        const response = await fetch('/api/obtener-metricas');
        if (!response.ok) throw new Error('Error de red al consultar a la API');
        const data = await response.json();

        new Tabulator("#inventario-grid", {
          data: data.inventario_total, 
          layout: "fitDataFill", /* Permite scroll horizontal dinámico para muchas columnas */
          pagination: "local",
          paginationSize: 15,
          columns: [
            { title: "Categoría", field: "categoria", headerFilter: "input", width: 140 },
            { title: "Computador (Cód.)", field: "computador", editor: "input", headerFilter: "input", width: 140 },
            { title: "Nº Serie / Teléfono", field: "numero_serie", editor: "input", headerFilter: "input", width: 140 },
            { title: "Fabricante y Modelo", field: "marca_modelo", editor: "input", headerFilter: "input", width: 160 },
            { title: "DNI", field: "dni", headerFilter: "input", width: 100 },
            { title: "Nombre Empleado", field: "nombre_empleado", headerFilter: "input", width: 180 },
            { title: "Usuario PC", field: "usuario_pc", headerFilter: "input", width: 120 },
            { title: "Oficio/Cargo", field: "oficio_cargo", headerFilter: "input", width: 140 },
            { title: "Área", field: "area", headerFilter: "input", width: 130 },
            { title: "Procesador", field: "procesador", headerFilter: "input", width: 120 },
            { title: "Memoria RAM", field: "ram", headerFilter: "input", width: 110 },
            { title: "Disco Duro", field: "disco_duro", headerFilter: "input", width: 110 },
            { 
              title: "Estado", 
              field: "estado_operativo", 
              editor: "list", 
              editorParams: { values: {"STOCK":"STOCK", "OPERATIVO":"OPERATIVO", "REPARACION":"REPARACION"} },
              formatter: function(cell) {
                const val = cell.getValue();
                if(!val) return "";
                if(val === 'OPERATIVO' || val === 'ACTIVA') return `<span class="tab-badge t-op">${val}</span>`;
                if(val === 'REPARACION' || val === 'SUSPENDIDA') return `<span class="tab-badge t-ret">${val}</span>`;
                return `<span class="tab-badge t-stk">${val}</span>`;
              }
            }
          ]
        });
      } catch (error) {
        document.getElementById('inventario-grid').innerHTML = `<p class='p-4 text-red-500 font-bold'>Error al cargar inventario: ${error.message}</p>`;
      }
    });
  </script>
</body>
</html>
