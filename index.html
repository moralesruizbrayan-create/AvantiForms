<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Avanti Soporte TI</title>
    <link rel="stylesheet" href="styles.css">
    <script>
        // Si ya está logueado, evitar que vea el login y mandarlo al dashboard
        if (localStorage.getItem('token')) {
            window.location.replace('dashboard.html');
        }
    </script>
</head>
<body class="dark-theme login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-placeholder">🌱 Avanti</div>
                <h2>Iniciar Sesión</h2>
                <p>Portal de Gestión de Actas y Equipos</p>
            </div>
            
            <form id="loginForm">
                <div class="input-group">
                    <label for="email">Correo Corporativo</label>
                    <input type="email" id="email" placeholder="brayan@avanti.com" required>
                </div>
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-avanti w-100">Ingresar al Portal</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // AQUÍ VA TU LÓGICA DE API (fetch a tu backend).
            // Simulamos un inicio de sesión exitoso:
            const loginExitoso = true; 
            
            if (loginExitoso) {
                // Guardamos el token/sesión
                localStorage.setItem('token', 'autenticado');
                
                // CORRECCIÓN: replace() evita que el login se guarde en el historial
                window.location.replace('dashboard.html');
            }
        });
    </script>
</body>
</html>
