<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal ITAM Avanti - Dashboard</title>
    <!-- Tailwind CSS para un diseño corporativo rápido y limpio -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js para gráficos dinámicos -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans">
    
    <!-- Navegación Corporativa -->
    <nav class="bg-green-900 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-wider">AVANTI ITAM</h1>
            <ul class="flex space-x-6">
                <li><a href="index.html" class="hover:text-green-300 font-semibold">Dashboard</a></li>
                <li><a href="gestion-actas.html" class="hover:text-green-300">Gestión de Actas</a></li>
                <li><a href="inventario.html" class="hover:text-green-300">Inventario Global</a></li>
            </ul>
        </div>
    </nav>

    <!-- Contenedor Principal del Dashboard -->
    <main class="container mx-auto mt-8 p-4">
        <h2 class="text-3xl font-bold mb-6 text-gray-700">Resumen de Activos TI</h2>
        
        <!-- Tarjetas de Métricas (KPIs) -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-lg shadow border-l-4 border-blue-500">
                <h3 class="text-gray-500 text-sm font-bold uppercase">Equipos Asignados</h3>
                <p id="kpi-asignados" class="text-3xl font-bold text-gray-800">Cargando...</p>
            </div>
            <div class="bg-white p-6 rounded-lg shadow border-l-4 border-green-500">
                <h3 class="text-gray-500 text-sm font-bold uppercase">Equipos en Stock</h3>
                <p id="kpi-stock" class="text-3xl font-bold text-gray-800">Cargando...</p>
            </div>
            <div class="bg-white p-6 rounded-lg shadow border-l-4 border-red-500">
                <h3 class="text-gray-500 text-sm font-bold uppercase">Equipos en Reparación</h3>
                <p id="kpi-reparacion" class="text-3xl font-bold text-gray-800">Cargando...</p>
            </div>
        </div>

        <!-- Contenedor del Gráfico -->
        <div class="bg-white p-6 rounded-lg shadow w-full md:w-2/3 mx-auto">
            <h3 class="text-xl font-bold mb-4 text-gray-700">Distribución de Hardware por Tipo</h3>
            <canvas id="hardwareChart"></canvas>
        </div>
    </main>

    <!-- Lógica de conexión con la API -->
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                // Hacemos la petición al backend para obtener la reportería en tiempo real
                const response = await fetch('/api/obtener-metricas');
                const data = await response.json();

                // 1. Actualizar las tarjetas KPI dinámicamente
                document.getElementById('kpi-asignados').innerText = data.kpis.asignados;
                document.getElementById('kpi-stock').innerText = data.kpis.stock;
                document.getElementById('kpi-reparacion').innerText = data.kpis.reparacion;

                // 2. Renderizar el gráfico con Chart.js usando los datos de la base de datos
                const ctx = document.getElementById('hardwareChart').getContext('2d');
                new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: data.grafico.etiquetas, // Ej: ['Laptops', 'Monitores', 'Teléfonos']
                        datasets: [{
                            data: data.grafico.valores, // Ej: [45, 20, 30]
                            backgroundColor: ['#1e40af', '#166534', '#b91c1c', '#ca8a04'],
                        }]
                    },
                    options: { responsive: true }
                });
            } catch (error) {
                console.error("Error cargando el dashboard:", error);
                document.getElementById('kpi-asignados').innerText = "Error";
            }
        });
    </script>
</body>
</html>
