<script>
    // 1. Verificación de sesión
    const sessionData = localStorage.getItem('session');
    if (!sessionData) {
        window.location.replace('index.html');
    }

    const session = JSON.parse(sessionData);

    // 2. Aplicar restricciones si es INVITADO una vez que cargue la página
    document.addEventListener('DOMContentLoaded', () => {
        
        // Actualizar el nombre en el badge superior
        const userBadge = document.querySelector('.user-badge');
        if (userBadge) {
            userBadge.textContent = session.role === 'viewer' ? '👁️ INVITADO (Lector)' : `HOLA, ${session.name.toUpperCase()}`;
        }

        // Si es invitado (viewer), bloquear botones de acción
        if (session.role === 'viewer') {
            const actionButtons = document.querySelectorAll('.btn-avanti, .btn-avanti-blue');
            
            actionButtons.forEach(btn => {
                // Cambiar el estilo para que parezca deshabilitado
                btn.style.opacity = '0.5';
                btn.style.cursor = 'not-allowed';
                
                // Quitar la redirección y mostrar una alerta
                btn.removeAttribute('onclick');
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    alert('Acceso denegado: Estás en modo visualización (Invitado). No tienes permisos para gestionar o abrir bases de datos.');
                });
            });
        }
    });
</script>
